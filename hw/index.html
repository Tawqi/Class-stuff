<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <div class="form">
        <div class="head">Sign Up</div>
        <div class="inputs">
            <div class="name"><input class="firstname" type="text" placeholder="First name">
                <input class="lastname" type="text" placeholder="Last name">
            </div>
            <input class="email" type="email" placeholder="Email">
            <input class="pass" type="password" placeholder="Enter a password">
            <input class="Confirm-pass" type="password" placeholder="Confirm password">
            <input class="sub" type="submit" value="Sign UP">
        </div>
    </div>
    <style>
        .form {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            gap: 1rem;
            width: fit-content;
            margin: 100px auto;
            background: rgba(0, 0, 0, 0.42);
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 16px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(3.3px);
            -webkit-backdrop-filter: blur(3.3px);
            border: 1px solid rgba(0, 0, 0, 0.3);
        }
        .head {
            text-align: center;
            font-weight: bold;
            font-size: 2rem;
            color: white;
        }
        .name {
            display: flex;
            gap:1rem;
        }
        .inputs {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        input:focus, textarea:focus {
            outline: none;

        }
        input:hover {
         transform: scale(1.05);  /* Makes the input 10% larger */
        transition: transform 0.3s ease;  /* Smooth transition effect */
        }
        .sub:hover {
            color: white;
            background-color: black;
            transition: transform 0.3s ease;
        }
        input {
            padding: 0.8rem;
            border: none;
            border-radius: 5px;
            box-shadow: 9px 9px 19px -12px rgba(0,0,0,0.75);
        }
    </style>
</body>
</html>
